<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mission Control v3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --border: #1e1e2a;
      --text: #e8e8f0;
      --text-muted: #6b6b80;
      --text-dim: #3a3a4a;
      --green: #22c55e;
      --green-bg: #052010;
      --green-border: #0d4a20;
      --yellow: #eab308;
      --yellow-bg: #1a1400;
      --yellow-border: #3d3000;
      --red: #ef4444;
      --red-bg: #1a0505;
      --red-border: #4a1010;
      --accent: #6366f1;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(10, 10, 15, 0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      animation: pulse-dot 2s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 10px var(--accent); }
      50% { opacity: 0.4; box-shadow: 0 0 4px var(--accent); }
    }

    .header-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .header-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .header-date {
      font-size: 12px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    /* MAIN */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 24px 48px;
      display: grid;
      gap: 36px;
    }

    /* SECTION LABEL */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    /* PROJECT GRID */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    @media (max-width: 600px) {
      .project-grid { grid-template-columns: 1fr; }
    }

    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: transform 0.15s, border-color 0.15s;
    }

    .project-card:hover { transform: translateY(-2px); }

    .project-card.status-live    { border-left: 3px solid var(--green); }
    .project-card.status-almost  { border-left: 3px solid var(--yellow); }
    .project-card.status-not-ready { border-left: 3px solid var(--red); }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .project-name {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .status-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 6px;
      white-space: nowrap;
    }

    .badge-live      { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .badge-almost    { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border); }
    .badge-not-ready { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

    .project-note {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .project-metrics {
      display: flex;
      gap: 20px;
    }

    .metric-value {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.04em;
      font-variant-numeric: tabular-nums;
    }

    .metric-value.zero  { color: var(--text-dim); }
    .metric-value.money { color: var(--green); }
    .metric-value.unknown { color: var(--text-muted); }

    .metric-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-top: 2px;
    }

    .analytics-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .analytics-pip {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .analytics-pip.on  { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .analytics-pip.off { background: var(--text-dim); }

    /* STATS ROW */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    @media (max-width: 600px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.04em;
      font-variant-numeric: tabular-nums;
      margin-bottom: 5px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* TWO COL */
    .two-col {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 32px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .two-col { grid-template-columns: 1fr; }
    }

    /* PRIORITY QUEUE */
    .queue-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .queue-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: background 0.15s;
    }

    .queue-item:hover { background: var(--surface2); }

    .queue-rank {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-dim);
      width: 18px;
      text-align: right;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .queue-body { flex: 1; min-width: 0; }

    .queue-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
    }

    .project-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 1px 6px;
      border-radius: 4px;
      background: rgba(99, 102, 241, 0.12);
      color: var(--accent);
      border: 1px solid rgba(99, 102, 241, 0.25);
      margin-right: 6px;
      vertical-align: middle;
    }

    .queue-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .queue-time {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .approval-tag {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
      background: var(--yellow-bg);
      color: var(--yellow);
      border: 1px solid var(--yellow-border);
    }

    /* KEY DECISIONS */
    .decisions-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .decision-card {
      background: var(--surface);
      border: 1px solid var(--yellow-border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .decision-icon {
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .decision-text {
      font-size: 13px;
      color: var(--text);
      line-height: 1.5;
    }

    /* RECENT UPDATES */
    .updates-list {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .update-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 18px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .update-item:last-child { border-bottom: none; }
    .update-item:hover { background: var(--surface2); }

    .update-pip {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.7;
      flex-shrink: 0;
    }

    .update-text {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 20px 24px;
      text-align: center;
      font-size: 12px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>

<script>
const DATA = {
  meta: {
    title: "Mission Control",
    subtitle: "Portfolio Command Center v3",
    lastUpdated: "2026-03-26"
  },

  projects: [
    {
      id: "trackr",
      name: "Trackr",
      status: "almost",
      statusLabel: "Almost",
      note: "Config fix done. Ready to deploy.",
      mrr: 0,
      users: 0,
      usersKnown: true,
      analytics: false,
      analyticsLabel: "No analytics"
    },
    {
      id: "onset",
      name: "Onset",
      status: "almost",
      statusLabel: "Almost",
      note: "Live at onsetdj.com. No auth or payments.",
      mrr: 0,
      users: null,
      usersKnown: false,
      analytics: true,
      analyticsLabel: "Vercel Analytics"
    },
    {
      id: "polititrack",
      name: "PolitiTrack",
      status: "live",
      statusLabel: "Live",
      note: "Live at polititrack-chi.vercel.app",
      mrr: 0,
      users: null,
      usersKnown: false,
      analytics: true,
      analyticsLabel: "Vercel Analytics"
    },
    {
      id: "sdr-copilot",
      name: "SDR Copilot",
      status: "not-ready",
      statusLabel: "Not Ready",
      note: "OAuth placeholder, audio broken, not published.",
      mrr: 0,
      users: 0,
      usersKnown: true,
      analytics: false,
      analyticsLabel: "No analytics"
    }
  ],

  priorityQueue: [
    { rank: 1, project: "Trackr",      task: "Set production env vars in Vercel + Railway",  time: "1 hour",    needsApproval: false },
    { rank: 2, project: "Trackr",      task: "Get correct Stripe price ID (price_xxx format)", time: "30 min",   needsApproval: false },
    { rank: 3, project: "Trackr",      task: "Switch Stripe to live mode",                    time: "15 min",    needsApproval: true  },
    { rank: 4, project: "Trackr",      task: "Deploy and verify with QA",                     time: "30 min",    needsApproval: true  },
    { rank: 5, project: "PolitiTrack", task: "Fix localhost in NEXT_PUBLIC_SITE_URL",          time: "5 min",     needsApproval: false },
    { rank: 6, project: "Onset",       task: "Wire up Supabase auth",                         time: "2–3 hours", needsApproval: false },
    { rank: 7, project: "Onset",       task: "Build payment flow",                            time: "1–2 days",  needsApproval: false },
    { rank: 8, project: "SDR Copilot", task: "Fix OAuth + manifest + audio relay",            time: "2–3 weeks", needsApproval: false }
  ],

  recentUpdates: [
    "Trackr production config fixed (CORS, OAuth, Stripe URLs)",
    "DEPLOY.md created with full deployment guide",
    "Launch readiness audit completed across all 4 projects",
    "Mission control dashboard rebuilt as operational command center",
    "45+ development tasks executed across all projects",
    "Stripe integration built for Trackr",
    "Landing page shipped for Onset at onsetdj.com",
    "FEC data expanded for PolitiTrack",
    "Legal docs deployed to all repos",
    "Security audit completed"
  ],

  keyDecisions: [
    "Approve Trackr production deploy (env vars ready to set)",
    "Choose Stripe pricing for Trackr — what to charge?",
    "Onset monetization strategy — freemium or subscription?"
  ],

  stats: {
    totalMRR: 0,
    liveProjects: 1,
    almostProjects: 2,
    totalProjects: 4
  }
};
</script>

<header>
  <div class="header-left">
    <div class="logo-dot"></div>
    <div>
      <div class="header-title" id="hTitle"></div>
      <div class="header-subtitle" id="hSubtitle"></div>
    </div>
  </div>
  <div class="header-date" id="hDate"></div>
</header>

<main>

  <section>
    <div class="section-label">Portfolio Pulse</div>
    <div class="project-grid" id="projectGrid"></div>
  </section>

  <section>
    <div class="section-label">Revenue &amp; Users</div>
    <div class="stats-row" id="statsRow"></div>
  </section>

  <div class="two-col">
    <section>
      <div class="section-label">Priority Queue</div>
      <div class="queue-list" id="queueList"></div>
    </section>
    <section>
      <div class="section-label">Key Decisions Needed</div>
      <div class="decisions-list" id="decisionsList"></div>
    </section>
  </div>

  <section>
    <div class="section-label">Recent Updates — Last 48 Hours</div>
    <div class="updates-list" id="updatesList"></div>
  </section>

</main>

<footer id="footer"></footer>

<script>
(function () {
  const { meta, projects, priorityQueue, recentUpdates, keyDecisions, stats } = DATA;

  document.getElementById('hTitle').textContent = meta.title;
  document.getElementById('hSubtitle').textContent = meta.subtitle;
  document.getElementById('hDate').textContent = meta.lastUpdated;

  // Portfolio pulse
  const grid = document.getElementById('projectGrid');
  projects.forEach(p => {
    const usersVal = p.usersKnown ? (p.users === 0 ? '0' : p.users.toLocaleString()) : '—';
    const usersClass = !p.usersKnown ? 'unknown' : p.users === 0 ? 'zero' : '';
    const card = document.createElement('div');
    card.className = `project-card status-${p.status}`;
    card.innerHTML = `
      <div class="card-top">
        <div class="project-name">${p.name}</div>
        <div class="status-badge badge-${p.status}">${p.statusLabel}</div>
      </div>
      <div class="project-note">${p.note}</div>
      <div class="project-metrics">
        <div>
          <div class="metric-value ${p.mrr === 0 ? 'zero' : 'money'}">$${p.mrr}</div>
          <div class="metric-label">MRR</div>
        </div>
        <div>
          <div class="metric-value ${usersClass}">${usersVal}</div>
          <div class="metric-label">Users</div>
        </div>
      </div>
      <div class="analytics-row">
        <div class="analytics-pip ${p.analytics ? 'on' : 'off'}"></div>
        <span>${p.analyticsLabel}</span>
      </div>
    `;
    grid.appendChild(card);
  });

  // Stats
  const statsRow = document.getElementById('statsRow');
  [
    { value: `$${stats.totalMRR}`, label: 'Total MRR' },
    { value: stats.liveProjects,   label: 'Live' },
    { value: stats.almostProjects, label: 'Almost Live' },
    { value: stats.totalProjects,  label: 'Total Projects' }
  ].forEach(s => {
    const el = document.createElement('div');
    el.className = 'stat-card';
    el.innerHTML = `<div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div>`;
    statsRow.appendChild(el);
  });

  // Priority queue
  const queueList = document.getElementById('queueList');
  priorityQueue.forEach(item => {
    const el = document.createElement('div');
    el.className = 'queue-item';
    el.innerHTML = `
      <div class="queue-rank">${item.rank}</div>
      <div class="queue-body">
        <div class="queue-title">
          <span class="project-tag">${item.project}</span>${item.task}
        </div>
      </div>
      <div class="queue-meta">
        <div class="queue-time">${item.time}</div>
        ${item.needsApproval ? '<div class="approval-tag">Approval</div>' : ''}
      </div>
    `;
    queueList.appendChild(el);
  });

  // Decisions
  const decisionsList = document.getElementById('decisionsList');
  keyDecisions.forEach(d => {
    const el = document.createElement('div');
    el.className = 'decision-card';
    el.innerHTML = `<div class="decision-icon">⚡</div><div class="decision-text">${d}</div>`;
    decisionsList.appendChild(el);
  });

  // Updates
  const updatesList = document.getElementById('updatesList');
  recentUpdates.forEach(u => {
    const el = document.createElement('div');
    el.className = 'update-item';
    el.innerHTML = `<div class="update-pip"></div><div class="update-text">${u}</div>`;
    updatesList.appendChild(el);
  });

  document.getElementById('footer').textContent =
    `Mission Control · ${meta.lastUpdated} · willyd248`;
})();
</script>

</body>
</html>
